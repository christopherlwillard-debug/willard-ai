openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Willard AI — NAS Media & Data Center API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: settings
    description: Application settings
  - name: scan
    description: NAS scanning operations
  - name: files
    description: File index operations
  - name: explorer
    description: NAS folder explorer
  - name: archives
    description: Archive file operations
  - name: documents
    description: Document file operations
  - name: storage
    description: Storage statistics
  - name: cleanup
    description: Cleanup suggestions
  - name: openai
    description: AI assistant operations
  - name: auth
    description: Authentication operations
  - name: organize
    description: Organization Center — extract, route and move files
  - name: system
    description: Server environment awareness and drive detection
  - name: library
    description: Smart library health and indexing controls

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /health/status:
    get:
      operationId: getHealthStatus
      tags: [health]
      summary: Get library health status
      responses:
        "200":
          description: Library health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryHealthStatus"

  # ── Auth ──────────────────────────────────────────────────────────────────
  /auth/status:
    get:
      operationId: getAuthStatus
      tags: [auth]
      summary: Get authentication status and setup state
      responses:
        "200":
          description: Auth status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthStatus"

  /auth/setup:
    post:
      operationId: setupAuth
      tags: [auth]
      summary: First-run password setup (returns recovery key)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthSetupInput"
      responses:
        "200":
          description: Setup complete with recovery key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSetupResult"
        "409":
          description: Password already set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthLoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"
        "401":
          description: Incorrect password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"

  /auth/recover:
    post:
      operationId: recoverAuth
      tags: [auth]
      summary: Reset password using recovery key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRecoverInput"
      responses:
        "200":
          description: Password reset and logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"
        "401":
          description: Invalid recovery key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change password (requires current session)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthChangePasswordInput"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"
        "401":
          description: Not authenticated or wrong current password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/sessions:
    get:
      operationId: listSessions
      tags: [auth]
      summary: List all active sessions
      responses:
        "200":
          description: Sessions list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionsResult"
    delete:
      operationId: revokeOtherSessions
      tags: [auth]
      summary: Revoke all sessions except the current one
      responses:
        "200":
          description: Sessions revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"

  /auth/sessions/{sid}:
    delete:
      operationId: revokeSession
      tags: [auth]
      summary: Revoke a specific session by ID
      parameters:
        - name: sid
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"

  # ── Settings ──────────────────────────────────────────────────────────────
  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get all settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSettings"
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsInput"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSettings"


  /settings/test-nas:
    post:
      operationId: testNasPath
      tags: [settings]
      summary: Test NAS path accessibility
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NasTestInput"
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NasTestResult"

  /settings/nas-dir-status:
    get:
      operationId: getNasDirStatus
      tags: [settings]
      summary: Check WillardAI directory structure status on NAS
      responses:
        "200":
          description: NAS directory status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NasDirStatus"

  /settings/reinit-nas-dirs:
    post:
      operationId: reinitNasDirs
      tags: [settings]
      summary: Recreate any missing WillardAI subdirectories on NAS
      responses:
        "200":
          description: Updated directory status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NasDirStatus"
        "400":
          description: NAS path not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  # ── Scan ──────────────────────────────────────────────────────────────────
  /scan:
    post:
      operationId: startScan
      tags: [scan]
      summary: Start a NAS scan
      responses:
        "202":
          description: Scan started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanJob"

  /scan/status:
    get:
      operationId: getScanStatus
      tags: [scan]
      summary: Get current scan status
      responses:
        "200":
          description: Current scan status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanStatus"

  /scan/history:
    get:
      operationId: getScanHistory
      tags: [scan]
      summary: Get recent scan history
      responses:
        "200":
          description: Scan history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScanJob"

  # ── Dashboard summary ─────────────────────────────────────────────────────
  /dashboard:
    get:
      operationId: getDashboard
      tags: [files]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  # ── Files / Search ────────────────────────────────────────────────────────
  /files/search:
    get:
      operationId: searchFiles
      tags: [files]
      summary: Search indexed files
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: fileType
          in: query
          schema:
            type: string
        - name: minSize
          in: query
          schema:
            type: integer
        - name: maxSize
          in: query
          schema:
            type: integer
        - name: after
          in: query
          schema:
            type: string
        - name: before
          in: query
          schema:
            type: string
        - name: source
          in: query
          schema:
            type: string
            enum: [local, all]
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileSearchResult"

  # ── Explorer ──────────────────────────────────────────────────────────────
  /explorer:
    get:
      operationId: listFolder
      tags: [explorer]
      summary: List contents of a NAS folder
      parameters:
        - name: path
          in: query
          schema:
            type: string
          description: Folder path relative to NAS root (empty = root)
      responses:
        "200":
          description: Folder contents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FolderListing"
        "404":
          description: Folder not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  # ── Archives ──────────────────────────────────────────────────────────────
  /archives:
    get:
      operationId: listArchives
      tags: [archives]
      summary: List all indexed archive files
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: minSize
          in: query
          schema:
            type: integer
        - name: maxSize
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Archive list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArchiveListResult"

  /archives/{id}:
    get:
      operationId: getArchive
      tags: [archives]
      summary: Get archive details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Archive details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArchiveDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /archives/{id}/peek:
    post:
      operationId: peekArchive
      tags: [archives]
      summary: Peek inside an archive without extracting
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Archive contents listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArchivePeekResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  # ── Documents ─────────────────────────────────────────────────────────────
  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List indexed documents
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: fileType
          in: query
          schema:
            type: string
            enum: [pdf, docx, xlsx, pptx, txt, other]
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Document list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentListResult"

  # ── Storage ───────────────────────────────────────────────────────────────
  /storage:
    get:
      operationId: getStorageStats
      tags: [storage]
      summary: Get NAS storage statistics
      responses:
        "200":
          description: Storage stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageStats"

  /storage/top-folders:
    get:
      operationId: getTopFolders
      tags: [storage]
      summary: Get top 20 largest folders
      responses:
        "200":
          description: Top folders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FolderStat"

  /storage/top-files:
    get:
      operationId: getTopFiles
      tags: [storage]
      summary: Get top 20 largest files
      responses:
        "200":
          description: Top files
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IndexedFile"

  # ── Cleanup ───────────────────────────────────────────────────────────────
  /cleanup/duplicates:
    get:
      operationId: getDuplicateFiles
      tags: [cleanup]
      summary: Get groups of duplicate files (by hash or perceptual fingerprint)
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Duplicate file groups
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DuplicateGroupResult"

  /cleanup/large-files:
    get:
      operationId: getLargeFiles
      tags: [cleanup]
      summary: Get files larger than 500MB
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Large files
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LargeFileResult"

  /cleanup/old-files:
    get:
      operationId: getOldFiles
      tags: [cleanup]
      summary: Get files not modified in 5+ years
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Old files
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OldFileResult"

  /cleanup/empty-folders:
    get:
      operationId: getEmptyFolders
      tags: [cleanup]
      summary: Get empty folders on the NAS
      responses:
        "200":
          description: Empty folders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmptyFolder"

  /cleanup/summary:
    get:
      operationId: getCleanupSummary
      tags: [cleanup]
      summary: Get cleanup summary counts
      responses:
        "200":
          description: Cleanup summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CleanupSummary"

  /cleanup/execute:
    post:
      operationId: executeCleanup
      tags: [cleanup]
      summary: Move selected files to Recycle Bin / .Trash and record history
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CleanupExecuteRequest"
      responses:
        "200":
          description: Cleanup result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CleanupExecuteResult"

  /cleanup/history:
    get:
      operationId: getCleanupHistory
      tags: [cleanup]
      summary: Get cleanup history sessions (newest first)
      responses:
        "200":
          description: Cleanup history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CleanupHistoryResult"

  /cleanup/trash:
    get:
      operationId: getCleanupTrash
      tags: [cleanup]
      summary: List files currently in the .Trash folder (newest first)
      responses:
        "200":
          description: Trash entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrashListResult"

  /cleanup/restore:
    post:
      operationId: restoreFromTrash
      tags: [cleanup]
      summary: Restore a file from .Trash back to its original location
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RestoreRequest"
      responses:
        "200":
          description: File restored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestoreResult"
        "400":
          description: Missing parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResult"
        "404":
          description: File not found in trash
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResult"
        "409":
          description: Entry expired or no library configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResult"

  # ── AI Chat ───────────────────────────────────────────────────────────────
  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"

  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"

  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a message and get a streaming AI response with NAS context
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiMessageInput"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}

  # ── Organize ───────────────────────────────────────────────────────────────
  /organize/jobs:
    get:
      operationId: listOrganizeJobs
      tags: [organize]
      summary: List all organization jobs
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrganizationJob"
    post:
      operationId: createOrganizeJob
      tags: [organize]
      summary: Create a new organization job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrganizeJobInput"
      responses:
        "201":
          description: Created job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationJob"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /organize/jobs/{id}:
    get:
      operationId: getOrganizeJob
      tags: [organize]
      summary: Get a specific organization job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Organization job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationJob"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteOrganizeJob
      tags: [organize]
      summary: Delete an organization job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Job is currently executing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /organize/jobs/{id}/analyze:
    post:
      operationId: analyzeOrganizeJob
      tags: [organize]
      summary: Analyze source and generate organization plan with AI confidence score
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated job with planJson populated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationJob"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "422":
          description: Source not found on disk
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /organize/jobs/{id}/preflight:
    post:
      operationId: preflightOrganizeJob
      tags: [organize]
      summary: Run pre-flight checks (disk space, writability, collisions)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated job with preflightJson populated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationJob"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "422":
          description: Analyze must be run first
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /organize/jobs/{id}/execute:
    get:
      operationId: executeOrganizeJob
      tags: [organize]
      summary: Execute the organization job (SSE stream of progress events)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: SSE stream of progress/status/complete/error events
          content:
            text/event-stream: {}

  /organize/jobs/{id}/plan:
    patch:
      operationId: updateOrganizeJobPlan
      tags: [organize]
      summary: Update plan exclusions (categories and/or specific file paths to skip)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrganizePlanUpdateInput"
      responses:
        "200":
          description: Updated job with revised plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationJob"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "422":
          description: Analyze must be run first
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /organize/jobs/{id}/apply-disposition:
    post:
      operationId: applyOrganizeJobDisposition
      tags: [organize]
      summary: Apply archive disposition (requires confirm=true; only valid after job is completed)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrganizeDispositionInput"
      responses:
        "200":
          description: Disposition applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizeDispositionResult"
        "400":
          description: confirm is required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Job not in completed state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /settings/logo:
    get:
      operationId: getSettingsLogo
      tags: [settings]
      summary: Stream the current branding logo
      responses:
        "200":
          description: Logo image
          content:
            image/png:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
            image/svg+xml:
              schema:
                type: string
                format: binary
        "404":
          description: No logo set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      operationId: uploadSettingsLogo
      tags: [settings]
      summary: Upload a branding logo (PNG, JPG, or SVG; max 2MB)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/LogoUpload"
      responses:
        "200":
          description: Logo uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSettings"
        "400":
          description: Invalid file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteSettingsLogo
      tags: [settings]
      summary: Remove the current branding logo
      responses:
        "200":
          description: Logo removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSettings"

  /system/environment:
    get:
      operationId: getSystemEnvironment
      tags: [system]
      summary: Server environment awareness (local vs cloud, platform)
      responses:
        "200":
          description: Environment info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemEnvironment"

  /system/drives:
    get:
      operationId: getSystemDrives
      tags: [system]
      summary: Detect reachable drives/mounts (local servers only)
      responses:
        "200":
          description: Detected drives
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DriveList"

  /library/health:
    get:
      operationId: getLibraryHealth
      tags: [library]
      summary: Smart library health snapshot (reachability, indexing, reconnect)
      responses:
        "200":
          description: Library health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryHealth"

  /library/retry:
    post:
      operationId: retryLibraryConnection
      tags: [library]
      summary: Immediately re-check library reachability ("Retry Now")
      responses:
        "200":
          description: Refreshed library health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryHealth"

  /library/reconnect-ack:
    post:
      operationId: acknowledgeLibraryReconnect
      tags: [library]
      summary: Dismiss the one-time "library reconnected" announcement
      responses:
        "200":
          description: Acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"

  /library/indexing/pause:
    post:
      operationId: pauseIndexing
      tags: [library]
      summary: Pause background indexing (and any running job)
      responses:
        "200":
          description: Indexing paused
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IndexingToggleResult"

  /library/indexing/resume:
    post:
      operationId: resumeIndexing
      tags: [library]
      summary: Resume background indexing (and the most recent paused job)
      responses:
        "200":
          description: Indexing resumed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IndexingToggleResult"

