kind = "web"
previewPath = "/"
title = "Willard AI"
version = "1.0.0"
id = "artifacts/willard-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25753

[services.development]
run = "pnpm --filter @workspace/willard-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/willard-ai", "run", "build" ]
publicDir = "artifacts/willard-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25753"
BASE_PATH = "/"
