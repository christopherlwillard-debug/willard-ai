kind = "mobile"
previewPath = "/willard-mobile/"
title = "Willard AI Mobile"
version = "1.0.0"
id = "artifacts/willard-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/willard-mobile/" ]
localPort = 23216

[services.development]
run = "pnpm --filter @workspace/willard-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/willard-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/willard-mobile", "run", "serve" ]

[services.env]
PORT = "23216"
BASE_PATH = "/willard-mobile/"
